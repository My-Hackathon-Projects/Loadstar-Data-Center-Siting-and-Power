name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: loadstar
          POSTGRES_PASSWORD: loadstar
          POSTGRES_DB: loadstar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://loadstar:loadstar@localhost:5432/loadstar
      LOADSTAR_TEST_POSTGRES_URL: postgresql://loadstar:loadstar@localhost:5432/loadstar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install -r requirements.txt
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run generate:types
      - run: make lint
      - run: make typecheck
      - run: make migrate
      - run: make test
